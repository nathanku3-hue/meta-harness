name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Node tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout without write credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
