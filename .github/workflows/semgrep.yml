name: Semgrep

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep CI gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep:1.167.0@sha256:06938c1f365d3f67b8cedd8bc117607ae64253f88a0e768e9da9408548927dd6
    steps:
      - name: Checkout without write credentials
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          persist-credentials: false

      - name: Run local Semgrep rules
        run: semgrep scan --config .semgrep.yml --error --strict --metrics=off --json --output semgrep-results.json

      - name: Upload Semgrep JSON artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: semgrep-results
          path: semgrep-results.json
          if-no-files-found: error
