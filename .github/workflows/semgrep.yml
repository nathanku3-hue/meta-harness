name: Semgrep

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep CI gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep:1.167.0@sha256:06938c1f365d3f67b8cedd8bc117607ae64253f88a0e768e9da9408548927dd6
    steps:
      - name: Checkout without write credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Run local Semgrep rules
        run: semgrep scan --config .semgrep.yml --error --strict --metrics=off --json --output semgrep-results.json

      - name: Upload Semgrep JSON artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: semgrep-results
          path: semgrep-results.json
          if-no-files-found: error
